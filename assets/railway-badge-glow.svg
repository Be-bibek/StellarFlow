<svg width="410" height="130" viewBox="-5 -5 410 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky-blue pulsing halo glow -->
  <rect width="400" height="120" rx="20" fill="none" stroke="#38bdf8" stroke-width="8">
    <animate attributeName="opacity" values="0; 0.6; 0" dur="2s" repeatCount="indefinite"/>
  </rect>

  <rect width="400" height="120" rx="20" fill="#08060D" stroke="#38bdf8" stroke-width="2"/>
  
  <!-- Left Side: Hosting Info -->
  <text x="25" y="40" fill="#94a3b8" font-family="JetBrains Mono, monospace, sans-serif" font-size="14" font-weight="bold" letter-spacing="1">HOSTED ON</text>
  <text x="25" y="75" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="900">Railway 🚄</text>
  
  <rect x="25" y="90" width="190" height="18" rx="4" fill="#6366f1"/>
  <text x="33" y="103" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">High-Performance Rust Backend</text>
  
  <rect x="225" y="90" width="90" height="18" rx="4" fill="#10b981"/>
  <text x="235" y="103" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">PostgreSQL DB</text>

  <!-- Right Side: Animated "Click to Launch" CTA -->
  <!-- Pulsing Glow Ring -->
  <rect x="230" y="28" width="145" height="34" rx="8" fill="none" stroke="#eab308" stroke-width="4">
    <animate attributeName="opacity" values="1; 0; 1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Solid Button -->
  <rect x="230" y="28" width="145" height="34" rx="8" fill="#eab308"/>
  <text x="242" y="50" fill="#000000" font-family="sans-serif" font-size="13" font-weight="900" letter-spacing="0.5">LAUNCH APP ↗</text>
  
  <text x="245" y="18" fill="#eab308" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="1">
    <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.5s" repeatCount="indefinite"/>
    ◀ CLICK HERE
  </text>
</svg>
