<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420">
  <defs>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-primary: #1f2937;
        --text-secondary: #6b7280;
        --border-color: #e5e7eb;
        
        --gold-bg: #fef08a;
        --gold-border: #eab308;
        --gold-text: #854d0e;
        
        --blue-bg: #bfdbfe;
        --blue-border: #3b82f6;
        --blue-text: #1e40af;
        
        --green-bg: #bbf7d0;
        --green-border: #22c55e;
        --green-text: #166534;
        
        --red-bg: #fecaca;
        --red-border: #ef4444;
        --red-text: #991b1b;
        
        --gray-bg: #f3f4f6;
        --gray-border: #d1d5db;
        
        --indigo-bg: #e0e7ff;
        --indigo-border: #6366f1;
        --indigo-text: #3730a3;
      }
      
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0f172a;
          --text-primary: #f8fafc;
          --text-secondary: #94a3b8;
          --border-color: #334155;
          
          --gold-bg: #713f12;
          --gold-text: #fef08a;
          
          --blue-bg: #1e3a8a;
          --blue-text: #bfdbfe;
          
          --green-bg: #14532d;
          --green-text: #bbf7d0;
          
          --red-bg: #7f1d1d;
          --red-text: #fecaca;
          
          --gray-bg: #1e293b;
          --gray-border: #475569;
          
          --indigo-bg: #312e81;
          --indigo-text: #c7d2fe;
        }
      }
      
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: var(--text-primary); }
      .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: var(--text-secondary); }
      .box-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: var(--text-primary); }
      .box-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: var(--text-secondary); }
      .box { stroke-width: 1.5; }
      .line { stroke: var(--border-color); stroke-width: 2; fill: none; }
      .arrow { fill: var(--border-color); }
    </style>
  </defs>

  <rect width="820" height="420" rx="12" fill="var(--bg-color)" />
  <rect width="820" height="420" rx="12" fill="none" stroke="var(--border-color)" stroke-width="2" />

  <text x="410" y="40" text-anchor="middle" class="title">Parallel Batch Payment Engine</text>
  <text x="410" y="62" text-anchor="middle" class="subtitle">Channel Account Worker Pool — eliminating sequence number collisions at scale</text>

  <!-- Frontend -->
  <rect x="40" y="100" width="160" height="70" rx="8" class="box" fill="var(--gold-bg)" stroke="var(--gold-border)" />
  <text x="120" y="130" text-anchor="middle" class="box-title" fill="var(--gold-text)">📋 Frontend</text>
  <text x="120" y="150" text-anchor="middle" class="box-desc" fill="var(--gold-text)">POST /payments/batch</text>

  <!-- Line from Frontend to Handler -->
  <line x1="200" y1="135" x2="250" y2="135" class="line" />
  <polygon points="250,131 258,135 250,139" class="arrow" />

  <!-- Axum Handler -->
  <rect x="260" y="100" width="160" height="70" rx="8" class="box" fill="var(--red-bg)" stroke="var(--red-border)" />
  <text x="340" y="130" text-anchor="middle" class="box-title" fill="var(--red-text)">🦀 Axum Handler</text>
  <text x="340" y="150" text-anchor="middle" class="box-desc" fill="var(--red-text)">Validate · Simulate</text>

  <!-- Lines to Workers -->
  <line x1="420" y1="135" x2="460" y2="135" class="line" />
  <line x1="460" y1="135" x2="460" y2="235" class="line" />
  
  <line x1="460" y1="135" x2="500" y2="135" class="line" />
  <polygon points="500,131 508,135 500,139" class="arrow" />

  <line x1="460" y1="185" x2="500" y2="185" class="line" />
  <polygon points="500,181 508,185 500,189" class="arrow" />

  <line x1="460" y1="235" x2="500" y2="235" class="line" />
  <polygon points="500,231 508,235 500,239" class="arrow" />

  <!-- Workers -->
  <rect x="510" y="115" width="220" height="40" rx="6" class="box" fill="var(--blue-bg)" stroke="var(--blue-border)" />
  <text x="620" y="134" text-anchor="middle" class="box-title" fill="var(--blue-text)">🦀 Worker 1 — Channel #1</text>
  <text x="620" y="148" text-anchor="middle" class="box-desc" fill="var(--blue-text)">SELECT FOR UPDATE SKIP LOCKED</text>

  <rect x="510" y="165" width="220" height="40" rx="6" class="box" fill="var(--blue-bg)" stroke="var(--blue-border)" />
  <text x="620" y="184" text-anchor="middle" class="box-title" fill="var(--blue-text)">🦀 Worker 2 — Channel #2</text>
  <text x="620" y="198" text-anchor="middle" class="box-desc" fill="var(--blue-text)">SELECT FOR UPDATE SKIP LOCKED</text>

  <rect x="510" y="215" width="220" height="40" rx="6" class="box" fill="var(--blue-bg)" stroke="var(--blue-border)" stroke-dasharray="4 4" />
  <text x="620" y="234" text-anchor="middle" class="box-title" fill="var(--blue-text)">🦀 Worker N — Channel #N</text>
  <text x="620" y="248" text-anchor="middle" class="box-desc" fill="var(--blue-text)">Horizontal Scale</text>

  <!-- PostgreSQL -->
  <ellipse cx="200" cy="280" rx="100" ry="40" class="box" fill="var(--green-bg)" stroke="var(--green-border)" />
  <text x="200" y="275" text-anchor="middle" class="box-title" fill="var(--green-text)">🐘 PostgreSQL</text>
  <text x="200" y="295" text-anchor="middle" class="box-desc" fill="var(--green-text)">Channel Account Lock Table</text>

  <!-- Lines from Postgres to Workers -->
  <path d="M280 260 Q 550 260 550 155" class="line" stroke-dasharray="6 4" opacity="0.6"/>
  <path d="M290 280 Q 530 280 530 205" class="line" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Horizon / Network -->
  <rect x="620" y="300" width="160" height="60" rx="8" class="box" fill="var(--gray-bg)" stroke="var(--gray-border)" />
  <text x="700" y="325" text-anchor="middle" class="box-title">🌐 Horizon API</text>
  <text x="700" y="345" text-anchor="middle" class="box-desc">/transactions submit</text>

  <!-- Line from workers to Horizon -->
  <line x1="700" y1="255" x2="700" y2="290" class="line" />
  <polygon points="700,300 696,292 704,292" class="arrow" />

  <line x1="40" y1="380" x2="780" y2="380" stroke="var(--border-color)" stroke-width="1" />
  <text x="410" y="400" text-anchor="middle" class="subtitle">100+ workers execute in parallel · Zero sequence collisions · Postgres advisory locking as coordinator</text>
</svg>
