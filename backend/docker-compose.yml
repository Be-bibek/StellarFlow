# StellarFlow Backend — Docker Compose (Development Stack)
# Starts PostgreSQL 15 and Redis 7 locally for development.
# Usage:  docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     stellarflow
      POSTGRES_PASSWORD: stellarflow_dev
      POSTGRES_DB:       stellarflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-run schema on first boot.
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://stellarflow:stellarflow_dev@postgres:5432/stellarflow_db
      REDIS_URL: redis://redis:6379/
      TREASURY_CONTRACT_ID: CCV7V5EOPNBSLKF4SRKHLRBA556HLUZLLIOCVR3OBZLLU4LD5DGISUPB
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
