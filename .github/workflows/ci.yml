name: StellarFlow CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-contract:
    name: Test Soroban Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/contracts
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Run Cargo Test
        run: cargo test

  build-frontend:
    name: Build Next.js App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install Dependencies
        run: npm ci --ignore-scripts
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build Next.js
        run: npm run build

  deploy-railway:
    name: Trigger Railway Deployment
    needs: [test-contract, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Railway Deploy
        run: echo "Code is pushed to main and tests passed. Railway will auto-deploy."
